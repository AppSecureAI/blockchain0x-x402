name: Semgrep Triage and Fix

permissions:
  contents: read
  id-token: write

on:
  workflow_dispatch:

jobs:
  semgrep-scan-and-process:
    runs-on: ubuntu-latest
    env:
      PROCESSING_MODE: group_cc
      AUTO_CREATE_PRS: "true"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Semgrep
        run: |
          python -m pip install --upgrade pip
          pip install semgrep

      - name: Run Semgrep scan
        run: |
          semgrep scan --config auto --sarif --output semgrep-results.sarif . || true

      - name: Upload SARIF as artifact
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-sarif
          path: semgrep-results.sarif
          retention-days: 7

      - name: AppSecAI Triage and Fix
        uses: AppSecureAI/automation-action@v1
        with:
          file: semgrep-results.sarif
